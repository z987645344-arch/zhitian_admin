<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>审核员页 - 知天管理后台</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>审核工作台</h1>
        <p id="currentUser" class="muted"></p>
      </div>
      <button id="logoutButton" class="secondary">退出</button>
    </header>

    <main class="page-grid">
      <section class="panel">
        <div class="section-title">
          <h2>待审核文档</h2>
          <button id="refreshPending" class="secondary">刷新</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>doc_id</th>
                <th>文件名</th>
                <th>上传者</th>
                <th>上传时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="pendingTable"></tbody>
          </table>
        </div>
        <div id="previewPanel" class="preview-panel hidden"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>文档管理</h2>
          <button id="refreshDocuments" class="secondary">刷新</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>文件名</th>
                <th>chunk数量</th>
                <th>上传时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="documentsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>记忆总览</h2>
          <button id="refreshStats" class="secondary">刷新</button>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <span>当前向量库文档数量</span>
            <strong id="vectorCount">-</strong>
          </div>
          <div class="stat-card">
            <span>SQLite对话记录数量</span>
            <strong id="sqliteCount">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>知识库内容</h2>
          <button id="refreshKnowledge" class="secondary">刷新</button>
        </div>

        <div class="knowledge-section">
          <h3>已确权文档（<span id="documentsCount">0</span>条）</h3>
          <div id="knowledgeDocuments" class="knowledge-list"></div>
        </div>

        <div class="knowledge-section">
          <h3>手动录入知识（<span id="manualInputsCount">0</span>条）</h3>
          <div id="knowledgeManualInputs" class="knowledge-list"></div>
        </div>

        <div class="knowledge-section">
          <h3>记忆片段（<span id="memoryFragmentsCount">0</span>条）</h3>
          <div id="knowledgeMemoryFragments" class="knowledge-list"></div>
        </div>

        <div class="danger-zone">
          <div class="section-title">
            <h2>危险操作区</h2>
          </div>
          <div class="actions">
            <button class="danger" data-danger-target="all_memory">清空所有对话记忆</button>
            <button class="danger" data-danger-target="all_documents">清空所有文档知识库</button>
          </div>
          <p id="dangerMessage" class="message" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <div id="dangerDialog" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-panel">
        <h2>管理员确认</h2>
        <p class="muted">此操作不可撤销，请输入管理员密码确认</p>
        <input id="adminSecretInput" type="password" placeholder="管理员密码" />
        <div class="actions">
          <button id="confirmDangerButton" class="danger">确认执行</button>
          <button id="cancelDangerButton" class="secondary">取消</button>
        </div>
      </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/reviewer.js"></script>
  </body>
</html>
