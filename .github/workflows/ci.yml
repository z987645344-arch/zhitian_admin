name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JavaScript syntax
        run: find js -name '*.js' -print0 | xargs -0 -n1 node --check
