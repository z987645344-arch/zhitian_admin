<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>忘记密码 · 知天</title><link rel="stylesheet" href="./css/style.css" /></head>
  <body class="auth-page">
    <main class="auth-shell"><section class="auth-card">
      <div class="brand-mark" aria-hidden="true">知</div>
      <div class="auth-heading"><p class="eyebrow">PASSWORD RECOVERY</p><h1>重置企业账号密码</h1><p class="muted">验证企业身份后，同一邮箱名下的企业角色将同步使用新密码。</p></div>
      <form id="forgotPasswordForm" class="form-stack">
        <label><span>邮箱</span><input id="email" type="email" autocomplete="email" required /></label>
        <label><span>邮箱验证码</span><div class="inline-actions"><input id="verificationCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required /><button id="sendCodeButton" type="button">发送验证码</button></div></label>
        <label><span>企业密码</span><input id="enterprisePassword" type="password" autocomplete="off" required /></label>
        <p id="message" class="message" aria-live="polite"></p>
        <button id="submitButton" type="submit" class="btn-block">重置密码</button>
      </form>
      <div id="passwordResult" class="result-box hidden" aria-live="polite"><span class="muted">一次性新密码</span><strong id="newPassword" class="one-time-password"></strong><p>请妥善保存，此密码不会再次显示</p></div>
      <p class="auth-link"><a href="./login.html">返回登录</a></p>
    </section></main>
    <script src="./js/api.js"></script><script src="./js/forgot-password.js"></script>
  </body>
</html>
